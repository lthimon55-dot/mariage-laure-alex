<div class="section" id="rsvp">
    <div class="card rsvp-card">
        <h2>💌 RSVP</h2>
        <p>Nous serions heureux de savoir si vous serez parmi nous 💚</p>

        <form class="rsvp-form">
            <input type="text" placeholder="Votre prénom & nom" required>
            
            <select required>
                <option value="">Votre réponse</option>
                <option>Je serai présent(e) 🎉</option>
                <option>Je ne pourrai pas venir 💔</option>
            </select>

            <textarea placeholder="Un petit mot pour nous ? (optionnel)"></textarea>

            <button type="submit">Envoyer ma réponse</button>
        </form>
    </div>
</div>
